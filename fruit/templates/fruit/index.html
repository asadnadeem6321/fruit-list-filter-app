<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fruit List</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #f4f6f9 0%, #e8edf3 100%);
      color: #2c3e50;
      min-height: 100vh;
    }

    .app-container { max-width: 900px; margin: 0 auto; padding: 2.5rem 1rem; }

    .app-header { text-align: center; margin-bottom: 2rem; }
    .app-header h1 {
      font-size: 2.6rem; font-weight: 800; color: #1a252f;
      letter-spacing: -0.5px;
    }
    .subtitle { color: #7f8c8d; margin-top: 0.4rem; font-size: 1rem; }

    .stats-bar {
      display: flex; justify-content: center; gap: 1.5rem;
      margin-top: 1rem; flex-wrap: wrap;
    }
    .stat-chip {
      background: #fff; border-radius: 20px; padding: 0.3rem 0.9rem;
      font-size: 0.82rem; font-weight: 600; color: #555;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .stat-chip span { font-weight: 800; color: #2c3e50; }

    .filter-bar {
      background: #fff;
      border-radius: 14px;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      margin-bottom: 1rem;
    }
    .filter-title {
      font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; color: #95a5a6; margin-bottom: 1rem;
    }
    .filter-controls { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; gap: 0.3rem; flex: 1 1 170px; }
    .filter-group label { font-size: 0.82rem; font-weight: 700; color: #444; }

    .filter-group input,
    .filter-group select {
      padding: 0.6rem 0.8rem;
      border: 1.5px solid #dce3ea;
      border-radius: 8px;
      font-size: 0.95rem;
      background: #fff;
      color: #2c3e50;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .filter-group input:focus,
    .filter-group select:focus {
      border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52,152,219,0.12);
    }

    #clear-btn {
      padding: 0.6rem 1.3rem;
      background: #e74c3c;
      color: #fff; border: none; border-radius: 8px;
      font-size: 0.88rem; font-weight: 700; cursor: pointer;
      align-self: flex-end; transition: background 0.2s, transform 0.1s;
      display: none;
    }
    #clear-btn:hover { background: #c0392b; }
    #clear-btn:active { transform: scale(0.97); }

    #active-filters {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
      margin-top: 0.9rem; min-height: 0;
    }
    .filter-tag {
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: #eaf4fd; color: #2980b9;
      border-radius: 20px; padding: 0.25rem 0.75rem;
      font-size: 0.78rem; font-weight: 600;
      animation: fadeInTag 0.2s ease;
    }
    .filter-tag .remove-tag {
      cursor: pointer; font-size: 0.85rem; color: #2980b9;
      line-height: 1; opacity: 0.7;
    }
    .filter-tag .remove-tag:hover { opacity: 1; }
    @keyframes fadeInTag { from { opacity:0; transform:scale(0.85); } to { opacity:1; transform:scale(1); } }

    .spinner-wrap { display: flex; justify-content: center; padding: 3rem 0; }
    .spinner {
      width: 38px; height: 38px;
      border: 4px solid #dce3ea;
      border-top-color: #3498db;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      text-align: center; padding: 2rem;
      color: #e74c3c; background: #fdf3f3;
      border-radius: 10px; font-weight: 600;
    }
    .empty-state {
      text-align: center; padding: 3.5rem 1rem;
      color: #bdc3c7; font-size: 1.1rem;
    }
    .empty-state .empty-icon { font-size: 3rem; display: block; margin-bottom: 0.75rem; }

    .result-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.75rem; flex-wrap: wrap; gap: 0.5rem;
    }
    .result-count { font-size: 0.88rem; color: #7f8c8d; font-weight: 600; }
    .ajax-indicator {
      font-size: 0.75rem; color: #3498db; font-weight: 600;
      opacity: 0; transition: opacity 0.2s;
    }
    .ajax-indicator.visible { opacity: 1; }

    .fruit-list { list-style: none; display: flex; flex-direction: column; gap: 0.55rem; }

    .fruit-item {
      display: flex; align-items: center; gap: 1rem;
      background: #fff; border-radius: 12px; padding: 1rem 1.25rem;
      box-shadow: 0 1px 5px rgba(0,0,0,0.06);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
      cursor: default;
    }
    .fruit-item:hover {
      transform: translateX(4px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    }

    .color-dot {
      width: 20px; height: 20px; border-radius: 50%;
      flex-shrink: 0; border: 2px solid rgba(0,0,0,0.08);
      transition: transform 0.2s;
    }
    .fruit-item:hover .color-dot { transform: scale(1.25); }

    .fruit-name { font-weight: 700; font-size: 1rem; flex: 1; }
    .fruit-color {
      font-size: 0.82rem; color: #95a5a6; text-transform: capitalize;
      min-width: 65px; font-weight: 500;
    }
    .season-badge {
      font-size: 0.78rem; font-weight: 700;
      padding: 0.28rem 0.7rem; border-radius: 20px; white-space: nowrap;
    }
    .in-season    { background: #eafaf1; color: #27ae60; }
    .out-of-season { background: #fdf3f3; color: #c0392b; }

    @media (max-width: 600px) {
      .fruit-item { flex-wrap: wrap; }
      .fruit-color { display: none; }
      .stats-bar { gap: 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="app-container">

    <header class="app-header">
      <h1>🍎 Fruit List</h1>
      <p class="subtitle">Browse, search, and filter your favourite fruits</p>
      <div class="stats-bar" id="stats-bar">
        <div class="stat-chip">Total <span id="stat-total">—</span></div>
        <div class="stat-chip">🟢 In Season <span id="stat-in">—</span></div>
        <div class="stat-chip">🔴 Out of Season <span id="stat-out">—</span></div>
      </div>
    </header>

    <main>
      <section class="filter-bar" aria-label="Fruit filters">
        <p class="filter-title">Filters</p>
        <div class="filter-controls">

          <div class="filter-group">
            <label for="name-filter">Name</label>
            <input id="name-filter" type="text"
              placeholder="e.g. app" aria-label="Filter by name" autocomplete="off" />
          </div>

          <div class="filter-group">
            <label for="color-filter">Color</label>
            <select id="color-filter" aria-label="Filter by color">
              <option value="">All colors</option>
              <option value="red">🔴 Red</option>
              <option value="yellow">🟡 Yellow</option>
              <option value="green">🟢 Green</option>
              <option value="orange">🟠 Orange</option>
              <option value="purple">🟣 Purple</option>
              <option value="blue">🔵 Blue</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="season-filter">In Season</label>
            <select id="season-filter" aria-label="Filter by season">
              <option value="">All</option>
              <option value="true">✅ In Season</option>
              <option value="false">❌ Out of Season</option>
            </select>
          </div>

          <button id="clear-btn" aria-label="Clear all filters">✕ Clear</button>
        </div>

        <div id="active-filters"></div>
      </section>

      <div class="result-meta" id="result-meta" style="display:none;">
        <p class="result-count" id="result-count"></p>
        <p class="ajax-indicator" id="ajax-indicator">⟳ Fetching...</p>
      </div>

      <div id="result-container"></div>
    </main>

  </div>

  <script>
    const COLOR_MAP = {
      red: "#e74c3c", yellow: "#f1c40f", green: "#2ecc71",
      orange: "#e67e22", purple: "#9b59b6", blue: "#3498db",
    };

    let activeXHR = null;  
    let debounceTimer = null;


    function readParams() {
      const p = new URLSearchParams(window.location.search);
      return {
        name:     p.get("name")      || "",
        color:    p.get("color")     || "",
        inSeason: p.get("in_season") || "",
      };
    }

    function applyFiltersToInputs({ name, color, inSeason }) {
      $("#name-filter").val(name);
      $("#color-filter").val(color);
      $("#season-filter").val(inSeason);
      toggleClearBtn(name, color, inSeason);
      renderActiveTags(name, color, inSeason);
    }

    function toggleClearBtn(name, color, inSeason) {
      if (name || color || inSeason) {
        $("#clear-btn").fadeIn(150);
      } else {
        $("#clear-btn").fadeOut(150);
      }
    }

    function updateURL({ name, color, inSeason }) {
      const p = new URLSearchParams();
      if (name)     p.set("name", name);
      if (color)    p.set("color", color);
      if (inSeason) p.set("in_season", inSeason);
      const qs = p.toString();
      history.pushState({}, "", qs ? "?" + qs : window.location.pathname);
    }

    function renderActiveTags(name, color, inSeason) {
      const $wrap = $("#active-filters").empty();
      if (name) {
        $wrap.append(makeTag("Name: " + name, function () {
          $("#name-filter").val("").trigger("input");
        }));
      }
      if (color) {
        $wrap.append(makeTag("Color: " + color, function () {
          $("#color-filter").val("").trigger("change");
        }));
      }
      if (inSeason !== "") {
        const label = inSeason === "true" ? "In Season" : "Out of Season";
        $wrap.append(makeTag(label, function () {
          $("#season-filter").val("").trigger("change");
        }));
      }
    }

    function makeTag(text, onRemove) {
      const $tag = $('<span class="filter-tag"></span>').text(text);
      const $x   = $('<span class="remove-tag" title="Remove filter">✕</span>');
      $x.on("click", onRemove);
      $tag.append($x);
      return $tag;
    }

    function updateStats(fruits) {
      const total = fruits.length;
      const inS   = fruits.filter(function (f) { return f.in_season; }).length;
      const outS  = total - inS;
      $("#stat-total").text(total);
      $("#stat-in").text(inS);
      $("#stat-out").text(outS);
    }

    function fetchAndRender(filters) {
      if (activeXHR) { activeXHR.abort(); }

      const params = {};
      if (filters.name)     params.name      = filters.name;
      if (filters.color)    params.color     = filters.color;
      if (filters.inSeason) params.in_season = filters.inSeason;

      $("#result-container").html(
        '<div class="spinner-wrap"><div class="spinner"></div></div>'
      );
      $("#result-meta").show();
      $("#ajax-indicator").addClass("visible");

      activeXHR = $.ajax({
        url:      "/fruit",
        method:   "GET",
        data:     params,
        dataType: "json",

        success: function (fruits) {
          updateStats(fruits);
          renderFruits(fruits);
          $("#result-count").text(
            fruits.length + " fruit" + (fruits.length !== 1 ? "s" : "") + " found"
          );
        },

        error: function (xhr, status) {
          if (status === "abort") return;   
          $("#result-container").html(
            '<div class="error-msg">⚠️ Could not load fruits. Is the server running?</div>'
          );
          $("#result-count").text("");
        },

        complete: function () {
          $("#ajax-indicator").removeClass("visible");
          activeXHR = null;
        }
      });
    }

    function renderFruits(fruits) {
      if (fruits.length === 0) {
        $("#result-container").html(
          '<div class="empty-state">' +
          '<span class="empty-icon">🔍</span>' +
          'No fruits match the current filters.' +
          '</div>'
        );
        return;
      }

      const $list = $('<ul class="fruit-list"></ul>');

      $.each(fruits, function (i, f) {
        const dot   = COLOR_MAP[f.color.toLowerCase()] || "#888";
        const badge = f.in_season
          ? '<span class="season-badge in-season">✅ In Season</span>'
          : '<span class="season-badge out-of-season">❌ Out of Season</span>';

        const $item = $(
          '<li class="fruit-item">' +
          '<span class="color-dot" title="' + f.color + '"></span>' +
          '<span class="fruit-name">' + $('<span>').text(f.name).html() + '</span>' +
          '<span class="fruit-color">' + $('<span>').text(f.color).html() + '</span>' +
          badge +
          '</li>'
        );
        $item.find(".color-dot").css("background", dot);

        $item.css({ opacity: 0 }).appendTo($list);
        setTimeout(function () {
          $item.animate({ opacity: 1 }, 120);
        }, i * 30);
      });

      $("#result-container").empty().append($list);
    }

    function onFilterChange() {
      const filters = {
        name:     $("#name-filter").val().trim(),
        color:    $("#color-filter").val(),
        inSeason: $("#season-filter").val(),
      };
      toggleClearBtn(filters.name, filters.color, filters.inSeason);
      renderActiveTags(filters.name, filters.color, filters.inSeason);
      updateURL(filters);
      fetchAndRender(filters);
    }

    $(function () {
      $("#name-filter").on("input", function () {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(onFilterChange, 300);
      });

      $("#color-filter, #season-filter").on("change", onFilterChange);

      $("#clear-btn").on("click", function () {
        const empty = { name: "", color: "", inSeason: "" };
        applyFiltersToInputs(empty);
        updateURL(empty);
        fetchAndRender(empty);
      });

      $(window).on("popstate", function () {
        const filters = readParams();
        applyFiltersToInputs(filters);
        fetchAndRender(filters);
      });

      const initial = readParams();
      applyFiltersToInputs(initial);
      fetchAndRender(initial);
    });
  </script>
</body>
</html>
